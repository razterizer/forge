name: release linux

on:
  push:
    tags:
      - "release-*"
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

      - name: Prepare hosted release assets
        run: |
          ./build/dev/forge prepare-release

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: .forge/release/*.zip,boxes/*.cbox,boxes/*.sha256
          bodyFile: .forge/release/RELEASE_NOTES.md
          tag: ${{ github.ref_name }}
